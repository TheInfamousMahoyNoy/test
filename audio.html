<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaveForge Symphony Master – Tone.js Edition</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #090d16, #020408 70%);
  color: white;
  font-family: system-ui, -apple-system, sans-serif;
  padding: 24px;
}

.panel {
  max-width: 1500px;
  margin: auto;
  background: rgba(13, 20, 35, 0.88);
  backdrop-filter: blur(25px);
  border-radius: 24px;
  padding: 24px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  position: relative;
}

/* BLOCKER OVERLAY: Prevents clicking cells while samples are downloading */
#loadingOverlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(2, 4, 8, 0.85);
  backdrop-filter: blur(10px);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 24px;
  transition: opacity 0.5s ease;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid rgba(255,255,255,0.1);
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

h1 {
  margin: 0 0 6px;
  background: linear-gradient(90deg, #60a5fa, #34d399);
  -webkit-background-clip: text;
  color: transparent;
}

h2 {
  font-size: 1.1rem;
  color: #60a5fa;
  margin: 20px 0 10px 0;
}

.toolbar {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  margin: 18px 0;
}

button {
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #3b82f6, #10b981);
  color: white;
  transition: transform 0.1s;
}
button:hover { transform: translateY(-1px); }

.file-label {
  display: inline-flex;
  padding: 12px 18px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px dashed #3b82f6;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  color: #60a5fa;
}
input[type="file"] { display: none; }

.audacity-track {
  background: #050811;
  border-radius: 14px;
  padding: 16px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  margin-bottom: 20px;
}
canvas {
  width: 100%;
  height: 80px;
  background: #020408;
  border-radius: 8px;
  display: block;
  margin-top: 8px;
}

.sequencer-matrix {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 500px;
  overflow-y: auto;
  padding-right: 6px;
}
.matrix-row {
  display: flex;
  gap: 12px;
  align-items: center;
  background: rgba(255,255,255,0.03);
  padding: 10px;
  border-radius: 12px;
}

.row-meta {
  width: 180px;
}

.instrument-name {
  font-weight: 700;
  font-size: 0.9rem;
}

.instrument-type {
  font-size: 0.7rem;
  opacity: 0.6;
}

.steps-grid {
  display: flex;
  gap: 6px;
  flex: 1;
}

.step {
  flex: 1;
  height: 44px;
  background: #1e293b;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.12s;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  font-size: 0.75rem;
  font-weight: 700;
  color: #94a3b8;
  user-select: none;
}

.row-perc .step.active { background: #f59e0b; color: white; }
.row-mel .step.active { background: #3b82f6; color: white; }

.step.current-playhead {
  outline: 2px solid #ef4444;
}

.pitch-select {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  background: #1e293b;
  color: white;
  border: 1px solid #475569;
  border-radius: 4px;
  font-size: 0.7rem;
  z-index: 100;
  display: none;
  outline: none;
}

.step:hover .pitch-select,
.step .pitch-select:focus {
  display: block;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>

<body>

<div class="panel">
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <h3 style="margin: 0; color: #60a5fa;">Downloading Orchestra Sampler Banks...</h3>
    <p style="font-size: 0.85rem; color: #64748b; margin-top: 4px;">Bypassing CORS filters & caching audio buffers</p>
  </div>

  <h1>WaveForge Symphony Master – Tone.js Edition</h1>

  <div class="toolbar">
    <button id="globalPlayBtn">Play Project</button>
    <button id="globalStopBtn" class="btn-danger">Stop</button>
    
    <label class="file-label">
      Load Audacity Sample Audio
      <input type="file" id="audioLoader" accept="audio/*">
    </label>
    
    <span id="status">Loading...</span>
  </div>

  <div class="audacity-track">
    <div style="font-size: 0.85rem; color: #64748b;" id="fileNameDisplay">No linear backing sample file imported.</div>
    <canvas id="waveformCanvas"></canvas>
  </div>

  <h2>Symphony Master Sequencer Grid</h2>
  <div class="sequencer-matrix" id="symphonyMatrixContainer"></div>
</div>

<script>
/* ---------- UPDATED SAMPLE INITIALIZER WITH FIXED ABSOLUTE PATHS ---------- */
function initSamplers() {
  // Hardcoded absolute base path directly targeting Tone.js's remote asset repository
  const absoluteBase = "https://tonejs.github.io/audio/";

  SAMPLERS.piano = new Tone.Sampler({
    urls: { C4: "samsung-piano/C4.mp3" },
    baseUrl: absoluteBase
  }).toDestination();

  SAMPLERS.guitar = new Tone.Sampler({
    urls: { C4: "casio/A1.mp3" },
    baseUrl: absoluteBase
  }).toDestination();

  SAMPLERS.violin = new Tone.Sampler({
    urls: { C4: "berklee/violin_c4_long.mp3" },
    baseUrl: absoluteBase
  }).toDestination();

  SAMPLERS.flute = new Tone.Sampler({
    urls: { C5: "berklee/flute_c5_long.mp3" },
    baseUrl: absoluteBase
  }).toDestination();

  SAMPLERS.trumpet = new Tone.Sampler({
    urls: { C4: "berklee/trumpet_c4_long.mp3" },
    baseUrl: absoluteBase
  }).toDestination();

  SAMPLERS.drums = new Tone.Sampler({
    urls: {
      C1: "drum-samples/CR78/kick.mp3",
      D1: "drum-samples/CR78/snare.mp3",
      E1: "drum-samples/CR78/hihat.mp3"
    },
    baseUrl: absoluteBase
  }).toDestination();

  // SAFETY LOADING GATE
  Tone.loaded().then(() => {
    // Hide the blocker screen smoothly once everything is successfully buffered
    document.getElementById("loadingOverlay").style.opacity = "0";
    setTimeout(() => {
      document.getElementById("loadingOverlay").style.display = "none";
    }, 500);
    
    document.getElementById("status").textContent = "Ready";
    startTransportScheduling();
  }).catch(err => {
    document.getElementById("status").textContent = "Error downloading audio banks.";
    console.error("Sampler loading stalled:", err);
  });
}
</script>
</body>
</html>
