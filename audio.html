<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>M4B Chapter Editor</title>
<style>
  body { font-family: sans-serif; max-width: 800px; margin: 20px auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #ccc; padding: 6px; }
  input[type=text] { width: 100%; }
  textarea { width: 100%; height: 150px; margin-top: 10px; }
</style>
</head>
<body>

<h2>M4B Chapter Editor</h2>

<input type="file" id="fileInput" accept="audio/*"><br><br>

<audio id="audio" controls style="width:100%;"></audio><br><br>

<button id="addChapter" disabled>Add Chapter at Current Time</button>
<button id="clearChapters" disabled>Clear Chapters</button>

<table>
  <thead>
    <tr><th>#</th><th>Time</th><th>Title</th><th>Delete</th></tr>
  </thead>
  <tbody id="chapterTable"></tbody>
</table>

<button id="exportBtn" disabled>Export Chapters</button>
<textarea id="output" readonly></textarea>

<script>
let chapters = [];
const audio = document.getElementById("audio");
const table = document.getElementById("chapterTable");
const output = document.getElementById("output");

function formatTime(sec) {
  sec = Math.floor(sec);
  const h = String(Math.floor(sec/3600)).padStart(2,'0');
  const m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  return `${h}:${m}:${s}`;
}

function render() {
  table.innerHTML = "";
  chapters.forEach((ch, i) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${i+1}</td>
      <td>${formatTime(ch.time)}</td>
      <td><input type="text" value="${ch.title}" data-index="${i}" class="titleInput"></td>
      <td><button data-del="${i}">X</button></td>
    `;
    table.appendChild(row);
  });
}

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  audio.src = URL.createObjectURL(file);
  document.getElementById("addChapter").disabled = false;
});

document.getElementById("addChapter").addEventListener("click", () => {
  chapters.push({ time: audio.currentTime, title: "Chapter " + (chapters.length+1) });
  render();
  document.getElementById("clearChapters").disabled = false;
  document.getElementById("exportBtn").disabled = false;
});

document.getElementById("clearChapters").addEventListener("click", () => {
  chapters = [];
  render();
  output.value = "";
  document.getElementById("exportBtn").disabled = true;
});

table.addEventListener("input", e => {
  if (e.target.classList.contains("titleInput")) {
    const i = e.target.dataset.index;
    chapters[i].title = e.target.value;
  }
});

table.addEventListener("click", e => {
  if (e.target.dataset.del !== undefined) {
    chapters.splice(e.target.dataset.del, 1);
    render();
  }
});

document.getElementById("exportBtn").addEventListener("click", () => {
  let txt = ";FFmpeg chapters\n";
  chapters.sort((a,b)=>a.time-b.time);
  chapters.forEach((ch, i) => {
    const start = Math.floor(ch.time * 1000);
    const end = (i < chapters.length-1)
      ? Math.floor(chapters[i+1].time * 1000)
      : Math.floor(audio.duration * 1000);

    txt += `[CHAPTER]\nTIMEBASE=1/1000\nSTART=${start}\nEND=${end}\ntitle=${ch.title}\n`;
  });
  output.value = txt;
});
</script>

</body>
</html>
